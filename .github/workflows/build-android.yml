name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Create www folder with notification bridge
        run: |
          mkdir -p www
          cat > www/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
            <title>ONBgram</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { background: #0f1621; width: 100vw; height: 100vh; overflow: hidden; }
              #loader {
                position: fixed; inset: 0; background: #0f1621;
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                color: #3390ec; font-family: sans-serif; gap: 16px;
              }
              .spinner {
                width: 48px; height: 48px;
                border: 4px solid #1e2a38;
                border-top-color: #3390ec;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
              }
              .app-title { font-size: 24px; font-weight: 700; }
              .app-sub { font-size: 13px; color: #a0a9b5; }
              @keyframes spin { to { transform: rotate(360deg); } }
              #offline-msg {
                display: none; position: fixed; inset: 0; background: #0f1621;
                flex-direction: column; align-items: center; justify-content: center;
                color: #e1e5ea; font-family: sans-serif; gap: 16px;
                text-align: center; padding: 24px;
              }
              #offline-msg h2 { color: #ff4d4f; font-size: 22px; }
              #offline-msg p { color: #a0a9b5; font-size: 14px; line-height: 1.6; }
              #offline-msg button {
                background: #3390ec; color: white; border: none;
                padding: 12px 28px; border-radius: 10px;
                font-size: 15px; font-weight: 700; cursor: pointer;
              }
            </style>
          </head>
          <body>
            <div id="loader">
              <div class="spinner"></div>
              <div class="app-title">💬 ONBgram</div>
              <div class="app-sub">Chargement...</div>
            </div>
            <div id="offline-msg">
              <h2>📡 Hors ligne</h2>
              <p>ONBgram nécessite une connexion internet.<br>Vérifiez votre réseau et réessayez.</p>
              <button onclick="location.reload()">🔄 Réessayer</button>
            </div>
            <script>
              // ── Notification bridge ──────────────────────────────────────
              // Intercepts window.Notification and routes to Capacitor
              // so index.html needs zero changes
              (function () {
                let _notifAllowed = false;
                let _notifId = 1;

                function scheduleNative(title, body) {
                  if (!window.Capacitor) return;
                  try {
                    window.Capacitor.Plugins.LocalNotifications.schedule({
                      notifications: [{
                        id: _notifId++,
                        title: title || 'ONBgram',
                        body: body || '',
                        schedule: { at: new Date(Date.now() + 100) },
                        sound: 'default',
                        smallIcon: 'ic_launcher',
                        iconColor: '#3390ec'
                      }]
                    });
                  } catch (e) { console.warn('Native notif error:', e); }
                }

                async function requestNativePermission() {
                  if (!window.Capacitor) return 'denied';
                  try {
                    const result = await window.Capacitor.Plugins.LocalNotifications.requestPermissions();
                    _notifAllowed = result.display === 'granted';
                    return _notifAllowed ? 'granted' : 'denied';
                  } catch (e) { return 'denied'; }
                }

                // Override the browser Notification API
                const FakeNotification = function (title, options) {
                  if (_notifAllowed) scheduleNative(title, options?.body || '');
                };

                FakeNotification.permission = 'default';

                FakeNotification.requestPermission = async function () {
                  const perm = await requestNativePermission();
                  FakeNotification.permission = perm;
                  return perm;
                };

                // Expose on window so the iframe page can use it
                window.Notification = FakeNotification;

                // Auto-request permission when Capacitor is ready
                document.addEventListener('deviceready', async () => {
                  if (window.Capacitor) {
                    const perm = await requestNativePermission();
                    FakeNotification.permission = perm;
                  }
                });
              })();
              // ── End bridge ───────────────────────────────────────────────

              // Inject bridge into the loaded app page via postMessage
              // so that index.html on GitHub Pages also gets it
              window.addEventListener('message', function (e) {
                if (e.data && e.data.type === 'NOTIF_REQUEST') {
                  window.Notification.requestPermission().then(p => {
                    e.source.postMessage({ type: 'NOTIF_PERMISSION', permission: p }, '*');
                  });
                }
                if (e.data && e.data.type === 'NOTIF_SEND') {
                  if (window.Notification && window.Notification.permission === 'granted') {
                    new window.Notification(e.data.title, { body: e.data.body });
                  }
                }
              });

              setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('offline-msg').style.display = 'flex';
              }, 6000);

              window.location.replace('https://sachaborodkin.github.io/ONBgram/');
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Patch AndroidManifest for notifications
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add notification permission if not already present
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.VIBRATE" />|' "$MANIFEST"
          fi

      - name: Patch build.gradle for minSdk 26
        run: |
          # LocalNotifications requires minSdk 26
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' android/app/build.gradle || true
          sed -i 's/minSdk .*/minSdk 26/' android/app/build.gradle || true

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk ONBgram.apk

      - name: Get build info
        id: info
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.info.outputs.sha }}
          name: "📱 ONBgram Android — ${{ steps.info.outputs.date }}"
          body: |
            ## 📱 ONBgram — Android APK

            **Commit:** `${{ steps.info.outputs.sha }}`
            **Date:** ${{ steps.info.outputs.date }}

            ---

            ### 📥 Comment installer
            1. Téléchargez **ONBgram.apk** ci-dessous
            2. Sur Android : **Paramètres → Sécurité → Sources inconnues** ✅
            3. Ouvrez le fichier APK et installez
            4. Acceptez la permission notifications au premier lancement 🔔

            ### 🔄 Mises à jour
            Le contenu se met à jour automatiquement sans réinstaller.
            Un nouvel APK est seulement nécessaire pour les changements natifs.
          files: ONBgram.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}